steps:
  # Step 1 — Build the Docker image (uses Dockerfile, NOT buildpacks)
  - name: gcr.io/cloud-builders/docker
    id: Build
    args:
      - build
      - -t
      - $_IMAGE_TAG
      - .

  # Step 2 — Push to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    id: Push
    args:
      - push
      - $_IMAGE_TAG

  # Step 3 — Update existing job, or create it if it does not exist yet.
  #           All runtime env vars and secrets are already set on the job;
  #           this step only updates the container image.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Deploy
    entrypoint: bash
    args:
      - -c
      - |
        ENV_VARS="PROJECT_ID=admind-data-organisation,DATASET=admind_data_organisation,LOCATION=europe-west4,FIRESTORE_DATABASE=admindfirestore,MODEL_NAME=gemini-2.5-flash,WIKI_MODEL_NAME=gemini-2.5-pro,LLM_PROVIDER=auto,JOB_TYPE=full-sync,SCORO_PROJECT_MODE=all,PROJECT_MODE=active,PROJECT_LIMIT=100,DOCUMENT_LIMIT=25,CANDIDATE_LIMIT=50,SCORO_BASE_URL=https://admindagency.scoro.com,SCORO_COMPANY_ACCOUNT_ID=admindagency,DISCOVERY_ENGINE_PROJECT_NUMBER=493121771508,DISCOVERY_ENGINE_LOCATION=global,DISCOVERY_ENGINE_COLLECTION=default_collection,DISCOVERY_ENGINE_ENGINE_ID=gemini-enterprise-admind,DISCOVERY_ENGINE_SERVING_CONFIG=default_search,DISCOVERY_IMPERSONATE_USER=germain.safari@admindagency.com,WIKI_MAX_SOURCE_DOCS=30,WIKI_SOURCE_CHARS=12000,SCORO_PER_PAGE=100"
        SECRETS="GEMINI_API_KEY=gemini-api-key:latest,OPENAI_API_KEY=openai-api-key:latest,SCORO_API_KEY=scoro-api-token:latest"

        gcloud run jobs update admind-taxonomy-worker \
          --image=$_IMAGE_TAG \
          --region=$_REGION \
          --service-account=$_SERVICE_ACCOUNT \
          --task-timeout=3600 \
          --max-retries=0 \
          --tasks=1 \
          --update-env-vars="$$ENV_VARS" \
          --update-secrets="$$SECRETS" \
        || \
        gcloud run jobs create admind-taxonomy-worker \
          --image=$_IMAGE_TAG \
          --region=$_REGION \
          --service-account=$_SERVICE_ACCOUNT \
          --task-timeout=3600 \
          --max-retries=0 \
          --tasks=1 \
          --set-env-vars="$$ENV_VARS" \
          --set-secrets="$$SECRETS"

images:
  - $_IMAGE_TAG

substitutions:
  # Cloud Run Job lives in europe-west1
  _REGION: europe-west1
  _SERVICE_ACCOUNT: project-intelligence-worker@admind-data-organisation.iam.gserviceaccount.com
  # Artifact Registry in europe-west1 (matches job region; any AR region works fine)
  _IMAGE_TAG: europe-west1-docker.pkg.dev/$PROJECT_ID/admind/admind-taxonomy-worker:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
