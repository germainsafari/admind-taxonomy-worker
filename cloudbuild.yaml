steps:
  # Step 1 — Build the image
  - name: gcr.io/cloud-builders/docker
    id: Build
    args:
      - build
      - -t
      - $_IMAGE_TAG
      - .

  # Step 2 — Push the image
  - name: gcr.io/cloud-builders/docker
    id: Push
    args:
      - push
      - $_IMAGE_TAG

  # Step 3 — Create or update the Cloud Run Job
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Deploy
    entrypoint: bash
    args:
      - -c
      - |
        # Try to update an existing job first; if it doesn't exist yet, create it.
        gcloud run jobs update admind-taxonomy-worker \
          --image=$_IMAGE_TAG \
          --region=$_REGION \
          --service-account=$_SERVICE_ACCOUNT \
          --task-timeout=3600 \
          --max-retries=0 \
          --tasks=1 \
        || \
        gcloud run jobs create admind-taxonomy-worker \
          --image=$_IMAGE_TAG \
          --region=$_REGION \
          --service-account=$_SERVICE_ACCOUNT \
          --task-timeout=3600 \
          --max-retries=0 \
          --tasks=1

images:
  - $_IMAGE_TAG

substitutions:
  _REGION: europe-west4
  _SERVICE_ACCOUNT: project-intelligence-worker@admind-data-organisation.iam.gserviceaccount.com
  _IMAGE_TAG: europe-west4-docker.pkg.dev/$PROJECT_ID/admind/admind-taxonomy-worker:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
